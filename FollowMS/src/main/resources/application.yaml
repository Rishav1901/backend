server:
 port: 9002

spring:
 cloud:
  consul:
   host : localhost
   discovery:
     prefer-ip-address: true
     ip-address: 127.0.0.1
     register-health-check: false
 application:
   name: FollowMS

 datasource:
   url: jdbc:mysql://localhost:3306/follow_db
   username: root
   password: root

 jpa:
   hibernate:
     ddl-auto: update

   show-sql: true

   properties:
     hibernate:
       format-sql: true
