 POST_HASTTAG_NOT_FOUND: "Post Hashtag Not Found: "
 SAVED_NOT_FOUND : "Saved Post Not Found: "
 MEDIA_REQUIRED : "Please upload at least one image or video"
 INVALID_MEDIA_TYPE : "Only image and video files are allowed"
