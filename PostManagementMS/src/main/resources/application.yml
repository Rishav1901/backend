server.port: 9004 
spring: 
  datasource: 
    driverClassName: com.mysql.cj.jdbc.Driver 
    url: jdbc:mysql://localhost/instagram_post_db
    username: root
    password: root
  jpa: 
    hibernate.ddl-auto: update
  cloud:
   consul:
    host : localhost
    discovery:
      prefer-ip-address: true
      ip-address: 127.0.0.1
      register-health-check: false
  application:
   name : PostManagementMS
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 250MB

